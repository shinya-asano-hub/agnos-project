<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メール検索</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #e8e4de; font-family: -apple-system, sans-serif; min-height: 100vh; }

  /* ===== Loading Overlay (fullscreen center) ===== */
  #loading-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  #loading-overlay.hide { opacity: 0; transform: translateY(-100%); pointer-events: none; }
  .loading-inner { position: relative; display: flex; align-items: center; justify-content: center; }
  .loading-ring { position: absolute; width: 220px; height: 220px; }
  .loading-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .loading-ring-bg { fill: none; stroke: rgba(99,225,229,0.1); stroke-width: 1; }
  .loading-ring-progress { fill: none; stroke: #63E1E5; stroke-width: 1; stroke-linecap: round; stroke-dasharray: 653.5; stroke-dashoffset: 653.5; }

  /* ===== Header ===== */
  .header { position: relative; padding: 1.2rem 2rem; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; z-index: 100; background: #1a1a1a; }
  .header svg { height: 18px; width: auto; }
  .header-title { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); font-size: 0.85rem; color: #888; letter-spacing: 0.15em; }

  /* ===== Main ===== */
  .main { padding: 2rem; max-width: 700px; margin: 0 auto; position: relative; z-index: 100; background: #1a1a1a; }
  .row { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
  select, input { background: #2a2a2a; border: 1px solid #3a3a3a; color: #e8e4de; padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.95rem; outline: none; }
  select { width: 200px; cursor: pointer; }
  input { flex: 1; }
  input:focus, select:focus { border-color: #63E1E5; }
  button { background: #63E1E5; color: #1a1a1a; border: none; padding: 0.7rem 1.5rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  button:hover { background: #4fc8cc; }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .btn-gmail { background: none; border: 1px solid #3a3a3a; color: #e8e4de; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .btn-gmail:hover { border-color: #63E1E5; color: #63E1E5; }
  #status { font-size: 0.85rem; color: #888; margin-bottom: 1rem; }
  .result { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; }
  .result-subject { font-weight: 500; color: #e8e4de; margin-bottom: 0.4rem; }
  .result-from { font-size: 0.8rem; color: #888; margin-bottom: 0.6rem; }
  .result-body { font-size: 0.85rem; color: #aaa; line-height: 1.6; white-space: pre-wrap; }
  .no-result { color: #666; text-align: center; padding: 2rem; }
</style>
</head>

<!-- ===== Search UI ===== -->
<div class="main">
  <div class="row">
    <select id="account">
      <option value="all">全アカウント</option>
      <option value="gmail">Gmail</option>
      <option value="agnos">Agnos</option>
    </select>
    <input type="text" id="keyword" placeholder="件名キーワードを入力..." autofocus />
    <button onclick="search()">検索</button>
  </div>
  <div class="btn-row">
    <button class="btn-gmail" onclick="openGmail()">📧 Gmailで検索</button>
    <button class="btn-gmail" onclick="openOutlook()">📨 Outlookで検索</button>
  </div>
  <div id="status"></div>
  <div id="results"></div>
</div>

<script>
// ===== Loading animation =====
(function(){
  var glows = ['lgA','lgg','lgn','lgo','lgs'].map(function(id){return document.getElementById(id);});
  var letters = ['llA','llg','lln','llo','lls'].map(function(id){return document.getElementById(id);});
  var ring = document.getElementById('loadRing');
  var circ = 653.5;

  function anim(g,l,from,to,dur){
    return new Promise(function(resolve){
      var start=null;
      function step(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1);
        var e=p<0.5?2*p*p:-1+(4-2*p)*p;
        var v=from+(to-from)*e;
        g.setAttribute('opacity',v);
        l.setAttribute('opacity',v);
        if(p<1)requestAnimationFrame(step);else resolve();
      }
      requestAnimationFrame(step);
    });
  }
  function animRing(from,to,dur){
    return new Promise(function(resolve){
      var start=null;
      function step(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1);
        var e=p<0.5?2*p*p:-1+(4-2*p)*p;
        ring.style.strokeDashoffset=circ*(1-(from+(to-from)*e));
        if(p<1)requestAnimationFrame(step);else resolve();
      }
      requestAnimationFrame(step);
    });
  }
  function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}

  async function run(){
    animRing(0,1,5000);
    for(var i=0;i<5;i++){
      anim(glows[i],letters[i],0,1,1200);
      await delay(400);
    }
    await delay(2500);
    var overlay=document.getElementById('loading-overlay');
    overlay.classList.add('hide');
    setTimeout(function(){overlay.remove();},1000);
  }
  run();
})();

// ===== Search Loading =====
var searchLoadingActive = false;
function showSearchLoading(show){
  var el = document.getElementById('search-loading');
  if(show){
    el.style.display='flex';
    searchLoadingActive=true;
    runSearchAnim();
  } else {
    searchLoadingActive=false;
    el.style.display='none';
  }
}
function runSearchAnim(){
  var sGlows=['sgA','sgg','sgn','sgo','sgs'].map(function(id){return document.getElementById(id);});
  var sLetters=['slA','slg','sln','slo','sls'].map(function(id){return document.getElementById(id);});
  var sRing=document.getElementById('searchRing');
  var circ=653.5;
  function sAnim(g,l,from,to,dur){
    return new Promise(function(resolve){
      var start=null;
      function step(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1);
        var e=p<0.5?2*p*p:-1+(4-2*p)*p;
        var v=from+(to-from)*e;
        g.setAttribute('opacity',v);
        l.setAttribute('opacity',v);
        if(p<1)requestAnimationFrame(step);else resolve();
      }
      requestAnimationFrame(step);
    });
  }
  function sRingAnim(from,to,dur){
    return new Promise(function(resolve){
      var start=null;
      function step(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1);
        var e=p<0.5?2*p*p:-1+(4-2*p)*p;
        sRing.style.strokeDashoffset=circ*(1-(from+(to-from)*e));
        if(p<1)requestAnimationFrame(step);else resolve();
      }
      requestAnimationFrame(step);
    });
  }
  function sDelay(ms){return new Promise(function(r){setTimeout(r,ms);});}
  async function loop(){
    if(!searchLoadingActive) return;
    sRing.style.strokeDashoffset=circ;
    sRingAnim(0,1,5000);
    for(var i=0;i<5;i++){
      sAnim(sGlows[i],sLetters[i],0,1,1200);
      await sDelay(400);
    }
    await sDelay(2000);
    for(var i=0;i<5;i++){
      sAnim(sGlows[i],sLetters[i],1,0,800);
      await sDelay(200);
    }
    await sDelay(500);
    loop();
  }
  loop();
}

// ===== Search =====
document.getElementById('keyword').addEventListener('keydown', function(e){
  if(e.key==='Enter') search();
});

function search(){
  var keyword=document.getElementById('keyword').value.trim();
  var account=document.getElementById('account').value;
  if(!keyword) return;
  document.getElementById('status').textContent='検索中...';
  document.getElementById('results').innerHTML='';
  showSearchLoading(true);
  fetch('/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:keyword,account:account})})
    .then(function(r){return r.json();})
    .then(function(data){
      showSearchLoading(false);
      var results=data.results||[];
      document.getElementById('status').textContent=results.length+'件見つかりました';
      if(results.length===0){
        document.getElementById('results').innerHTML='<div class="no-result">見つかりませんでした<br><span style="font-size:0.8rem;color:#555;">Gmail/Outlookボタンでウェブ検索も試してください</span></div>';
        return;
      }
      results.forEach(function(r){
        var div=document.createElement('div');
        div.className='result';
        div.innerHTML='<div class="result-subject">'+(r.subject||'件名なし')+'</div>'
          +'<div class="result-from">'+(r.from||'')+(r.date?' ・ '+r.date:'')+'</div>'
          +'<div class="result-body">'+(r.body||'')+'</div>';
        document.getElementById('results').appendChild(div);
      });
    })
    .catch(function(err){showSearchLoading(false);document.getElementById('status').textContent='エラー: '+err.message;});
}

function openGmail(){
  var kw=document.getElementById('keyword').value.trim();
  window.open('https://mail.google.com/mail/u/0/#search/'+encodeURIComponent(kw||''),'_blank');
}
function openOutlook(){
  var kw=document.getElementById('keyword').value.trim();
  window.open('https://outlook.live.com/mail/0/search?q='+encodeURIComponent(kw||''),'_blank');
}
</script>
</body>
</html>
